<!DOCTYPE html> <!-- definindo que está trabalhando com o HTML 5 -->

        <title>Anatomia HTML</title>
    </head>
    <body> <!-- organizar a página, footer, conteúdo, cabeçalho, etc... -->

            <h1>Exercícios HTML</h1> <!-- título de 1º nível -->
        </header> 
        <nav> <!-- navegação -->
            <a href="/">Navegação 1</a>
        </nav> 
        <section id = "conteudo">
            Conteúdo
        </section>
        <footer> <!-- rodapé -->
            Rodapé
        </footer> 
    </body>
</html>
