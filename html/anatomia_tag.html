<!-- uma tag é definida por maior e menor <> -->
 <tag>
    <!-- comentário no HTML (Comentário) -->
    <!-- corpo da tag -->
    <bla>
        <opa>
            Texto 
        </opa>
    </bla> 
 </tag>
<!-- uma tag pode ter outras tags como "filhas" -->
<!-- podemos ter tags sem corpo definidas com a barra no final "/" -->
<tag/>
<!-- HTML : --> <meta><br><input>
<tag /> <meta /> <br /> <input />

<tag param1="valor1" param2='valor2'>
    <!-- podemos colocar parâmetros na tag de abertura -->
</tag>

<!-- tags sem corpo podem ter parâmetros também -->
<tag param1="valor1" param2='valor2' />

<input type="button" value=""> <!-- tags específicas do HTML e parâmetors do próprio HTML -->

 <!-- pode criar suas próprias tags e parâmetros (atributos) -->
<input type="text" cod3r-cpf>

<Calendario></Calendario> <!-- Componentes -->
