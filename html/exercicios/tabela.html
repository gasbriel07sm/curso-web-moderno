<table>
    <caption>Produtos</caption>
    <thead> <!-- cabeçalho da tabela -->
        <tr> <!-- table row -> coluna de uma tabela -->
            <th>Produto</th> <!-- table head -> conteúdo da table row -->
            <th>Preço</th>
            <th>Quantidade</th>
            <th>Total</th>
        </tr>
    </thead>
    <tbody> <!-- corpo da tabela -->
        <tr> <!-- cada tr equivale a uma linha-->
            <td>iPad</td> <!-- table data -> dados da tabela -->
            <td>3289.00</td>
            <td>5</td>
            <td>1645,00</td>
        </tr>
        <tr>
            <td>Bola</td> <!-- table data -> dados da tabela -->
            <td>32.00</td>
            <td>1</td>
            <td>32,00</td>
        </tr>
        <tr>
            <td>Notebook</td> <!-- table data -> dados da tabela -->
            <td>4289.00</td>
            <td>15</td>
            <td>2000,00</td>
        </tr>
    </tbody>
    <tfoot> <!-- rodapé da tabela -->
        <tr>
            <td colspan="3">Total</td> <!-- fazer uma coluna/linha ocupar mais de um espaço -->
            <td>3757445.10</td>
        </tr>
    </tfoot>
</table>

<style>
    table {
        border-collapse: collapse;
    }

    th, td {
        padding: 10px;
    }

    thead tr {
        border-bottom: solid 3px #444;
    }

    tbody tr:hover{
        background-color: #dedede;
    }

    tfoot {
        background-color: #444;
        color: #fff;
        font-weight: bold;
    }

</style>
