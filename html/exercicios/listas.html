<h1> Listas </h1>

<!-- Listas Ordenadas (ol > orderned list) -->
<h2>Aprovados</h2>
<ol>
    <!-- usamos a tag <li> para listar cada elemento da lista -->
    <li>Bida</li>
    <li>Pedro</li>
    <li>Ana</li>
    <li>João</li>
</ol>

<!-- Listas Não Ordenadas (ul -> unorderned list)-->
<h2>Lista de Compras</h2>
<ul>
    <!-- a tag <li> é para listar cada elemento, independente se é uma lista ordenada ou não ordenada -->
    <li>Queijo</li>
    <li>Leite</li>
    <!-- Lista aninhada -> uma lista dentro de um list item (<li>)-->
    <li>Arroz</li>
    <li>Pao</li>
</ul>

<!-- Lista de Definições (dl -> definition list) -->
<h2>Principais termos do glossário de Cloud Computing</h2>
<dl>
    <dt>BaaS</dt> <!-- dt (definition term) > o termo que você deseja definir -->
    <dd>Backend como Serviço</dd> <!-- a definição de fato do dt acima -->
    <dt>IaaS</dt>
    <dd>Infraestrutura como Serviço</dd>
    <dt>PaaS</dt>
    <dd>Plataforma como Serviço</dd>
    <dt>SaaS</dt>
    <dd>Software como Serviço</dd>
</dl>
