<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML</title>
    <style>
        #conteudo {
            padding: 30px 0px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Exercícios HTML</h1>
    </header>
    <nav>
        <a href="exercicios/teste.html">00 - Teste</a> |
        <a href="exercicios/texto01.html">01 - Texto 1</a> |
        <a href="exercicios/texto02.html">02 - Texto 2</a> |
        <a href="exercicios/listas.html">03 - Listas</a> | 
        <a href="exercicios/listas_aninhadas.html">04 - Listas Aninhadas</a> | 
        <a href="exercicios/links01.html">05 - Links 1</a> | 
        <a href="exercicios/links02.html">06 - Links 2</a> | 
        <a href="exercicios/tabela.html">07 - Tabela</a> | 
        <a href="exercicios/form/formulario01.html">08 - Formulário</a> | 
        <a href="exercicios/imagens.html">09 - Imagens</a> | 
        <a href="exercicios/videos.html">10 - Vídeos</a> | 
        <a href="exercicios/tags_nao_visuais.html">11 - Tags não visuais</a> | 
    </nav>
    <section id="conteudo"></section>
    <footer>
        Curso de Web Moderno
    </footer>

    <script>
        document.querySelectorAll('a').forEach(link => {
            const conteudo = document.getElementById('conteudo')
            link.onclick = function(e) {
                e.preventDefault()
                fetch(link.href)
                    .then(resp => resp.text())
                    .then(html => conteudo.innerHTML = html)
            }
        })
    </script>
</body>
</html>
